<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Bolão da Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13; --panel:#0E1219; --surface:#151A22; --elev1:#1B212B; --elev2:#141922; --input:#0E1219;
    --bd:#232A34; --bd2:#2A323E; --div:#1A202A; --div2:#1F2630; --bdin:#2E3742;
    --t1:#EEF1F5; --t2:#9AA3B0; --t3:#828B98; --t4:#6B7482; --t5:#5E6775;
    --accent:#E3B765; --ok:#38D69A; --warn:#E58A6B;
    --green:#38D69A; --red:#E58A6B; /* aliases usados em alguns render() */
    --p25:#38D69A; --p18:#5AA9E6; --p15:#9B8CFF; --p12:#C58AE5; --p10:#E3B765; --p5:#6B7482; --p0:#44505E;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -10%,#16202C,#070A0E 60%);min-height:100vh;color:var(--t1);
    font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-text-size-adjust:100%}
  svg{display:block}
  header{max-width:480px;margin:0 auto;padding:14px 22px 4px}
  header .eyebrow{font:500 11px 'Space Grotesk';letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .head-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:4px}
  .h-title{display:flex;align-items:center;gap:8px;font:700 22px 'Space Grotesk';letter-spacing:-.02em;color:var(--t1)}
  .h-title .ico{color:var(--accent);display:flex}
  .logout{display:flex;align-items:center;gap:6px;color:var(--t3);font:600 12px 'Hanken Grotesk';cursor:pointer;
    background:var(--surface);border:none;border-radius:999px;padding:7px 12px}
  .banner{display:flex;align-items:center;gap:8px;margin-top:10px;background:rgba(56,214,154,.1);
    border:1px solid rgba(56,214,154,.25);border-radius:10px;padding:8px 12px}
  .banner .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex:none}
  .banner span{font:600 11px 'Hanken Grotesk';color:var(--ok)}
  #status{font:600 12px 'Hanken Grotesk';margin-top:8px;min-height:1.1em}
  #status .ok{color:var(--ok)} #status .err{color:var(--warn)} #status .saving{color:var(--accent)}
  .tabs{max-width:480px;margin:8px auto 0;display:flex;gap:8px;overflow-x:auto;padding:4px 22px 8px;
    position:sticky;top:0;background:var(--bg);z-index:10;scrollbar-width:none;-ms-overflow-style:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{white-space:nowrap;background:var(--surface);color:var(--t2);border:1px solid var(--bd);
    border-radius:999px;padding:7px 13px;font:600 12px 'Hanken Grotesk';cursor:pointer}
  .tabs button.active{background:var(--accent);color:#0B0E13;border-color:var(--accent)}
  main{max-width:480px;margin:0 auto;padding:6px 22px 60px}
  .panel{display:none}.panel.active{display:block}
  .card{background:var(--surface);border:1px solid var(--bd);border-radius:16px;padding:13px 14px;margin-bottom:10px}
  .muted{color:var(--t3)}.center{text-align:center}
  .flag{font-size:1.05rem}
  code{background:var(--input);border:1px solid var(--bd);border-radius:5px;padding:1px 5px;font:500 12px 'Space Grotesk';color:var(--t2)}
  button.btn{background:var(--accent);color:#0B0E13;border:none;border-radius:11px;padding:11px 14px;
    font:700 13px 'Hanken Grotesk';cursor:pointer;margin:4px 6px 4px 0}
  button.btn.sec{background:var(--surface);color:var(--t1);border:1px solid var(--bd2)}
  button.btn.danger{background:var(--warn);color:#2A0E07}
  input,select,textarea{background:var(--input);color:var(--t1);border:1.5px solid var(--bd2);border-radius:10px;
    padding:9px 11px;font:600 14px 'Hanken Grotesk';font-family:'Hanken Grotesk',sans-serif}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  input[type=number]{width:40px;height:40px;text-align:center;font:700 16px 'Space Grotesk';padding:0;-moz-appearance:textfield}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  select{width:100%}
  textarea{width:100%;min-height:120px;resize:vertical;font:500 13px 'Space Grotesk';line-height:1.6}
  .filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filtros button{background:var(--surface);border:1px solid var(--bd);color:var(--t2);border-radius:999px;
    padding:6px 12px;font:600 12px 'Hanken Grotesk';cursor:pointer;white-space:nowrap}
  .filtros button.active{background:var(--accent);color:#0B0E13;border-color:var(--accent)}
  .grow{display:flex;align-items:center;gap:10px;padding:11px 2px;border-top:1px solid var(--div2);font:500 13px 'Hanken Grotesk'}
  .grow:first-child{border-top:none}
  .grow .n{width:30px;color:var(--t5);font:600 11px 'Space Grotesk';flex:none;text-align:center}
  .grow .conf{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
  .grow .inputs{flex:none;display:flex;align-items:center;gap:6px}
  .grow .extra{flex:none;width:118px;text-align:right;color:var(--t4);font:500 11px 'Hanken Grotesk'}
  .grow .x{cursor:pointer;color:var(--t5);padding:4px 6px;flex:none}
  .penrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 2px 11px 32px;
    font:600 11px 'Hanken Grotesk';color:var(--t3)}
  .penrow .pbtn{cursor:pointer;border:1px solid var(--bd2);border-radius:8px;padding:5px 10px;
    font:600 12px 'Hanken Grotesk';background:var(--input);color:var(--t2)}
  .penrow .pbtn.on{background:var(--accent);color:#0B0E13;border-color:var(--accent)}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font:700 12px 'Space Grotesk';color:#0B0E13}
  .stat{display:flex;gap:10px;flex-wrap:wrap}
  .stat .box{flex:1;min-width:96px;background:var(--surface);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
  .stat .box b{display:block;font:700 26px 'Space Grotesk';color:var(--accent)}
  .stat .box span{font:500 12px 'Hanken Grotesk';color:var(--t3)}
  .row-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  b{color:var(--t1)}
  /* Login */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;
    background:radial-gradient(1200px 700px at 50% -10%,#16202C,#070A0E 60%)}
  #login .box{width:100%;max-width:360px;text-align:center}
  .login-ic{width:64px;height:64px;border-radius:18px;background:var(--accent);display:flex;align-items:center;
    justify-content:center;color:#0B0E13;margin:0 auto}
  #login h2{font:700 25px 'Space Grotesk';letter-spacing:-.02em;margin:22px 0 0}
  #login p{font:500 14px 'Hanken Grotesk';color:var(--t3);margin:8px 0 0;line-height:1.5}
  .field{margin-top:16px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--bd2);
    border-radius:12px;padding:4px 4px 4px 16px}
  .field .ico{color:var(--t3);display:flex;flex:none}
  #login .field input{flex:1;border:none;background:transparent;color:var(--t1);font:600 16px 'Hanken Grotesk';
    outline:none;padding:12px 0;letter-spacing:.18em}
  #login .btn{width:100%;margin:14px 0 0;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:12px;font-size:15px}
  #login .erro{color:var(--warn);font:500 13px 'Hanken Grotesk';margin-top:12px;min-height:1em}
  #app{display:none}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="login-ic" id="loginIcon"></div>
    <h2>Admin do bolão</h2>
    <p>Digite a senha de administrador para lançar resultados e palpites.</p>
    <div class="field"><span class="ico" id="keyIcon"></span><input type="password" id="senha" placeholder="senha" autocomplete="current-password"></div>
    <button class="btn" id="btnEntrar">Entrar <span id="entrarIcon"></span></button>
    <div class="erro" id="loginErro"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="eyebrow">Copa 2026 · Bolão</div>
    <div class="head-row">
      <div class="h-title"><span class="ico" id="hIcon"></span>Admin</div>
      <button class="logout" id="btnLogout"><span id="logoutIcon"></span>Sair</button>
    </div>
    <div class="banner"><span class="dot"></span><span>No ar — alterações publicam na hora</span></div>
    <div id="status"></div>
  </header>

  <nav class="tabs">
    <button data-tab="resultados" class="active">Resultados</button>
    <button data-tab="palpites">Palpites</button>
    <button data-tab="acessos">Acessos</button>
    <button data-tab="relatorio">Relatório</button>
    <button data-tab="colar">Colar do grupo</button>
    <button data-tab="ferramentas">Ferramentas</button>
  </nav>

  <main>
    <section id="resultados" class="panel active"></section>
    <section id="palpites" class="panel"></section>
    <section id="acessos" class="panel"></section>
    <section id="relatorio" class="panel"></section>
    <section id="colar" class="panel"></section>
    <section id="ferramentas" class="panel"></section>
  </main>
</div>

<script>
/* ===================== ÍCONES (Lucide, inline) ===================== */
const ICONS = {"lock":"<rect width=\"18\" height=\"11\" x=\"3\" y=\"11\" rx=\"2\" ry=\"2\" /><path d=\"M7 11V7a5 5 0 0 1 10 0v4\" />","key-round":"<path d=\"M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z\" /><circle cx=\"16.5\" cy=\"7.5\" r=\".5\" fill=\"currentColor\" />","arrow-right":"<path d=\"M5 12h14\" /><path d=\"m12 5 7 7-7 7\" />","shield-check":"<path d=\"M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z\" /><path d=\"m9 12 2 2 4-4\" />","log-out":"<path d=\"m16 17 5-5-5-5\" /><path d=\"M21 12H9\" /><path d=\"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\" />"};
function ic(name, size){ size=size||20; return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }

/* ===================== AUTENTICAÇÃO / REDE ===================== */
let SENHA = sessionStorage.getItem('bolao_admin_pw') || '';
let state = null;
let acessos = [];          // lista de credenciais (vinda de /api/acessos)
let saveTimer = null;
let saveAuthoritative = false;
// Edições de palpite feitas pelo admin NESTA sessão: "id|n" -> {casa,fora} | null(apagar).
// Servem para o merge não desfazer o que os participantes salvarem em paralelo.
let palpEdits = {};

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2));

// GET com header de admin -> estado COMPLETO (sem ocultar palpites).
async function apiGet(){
  const r = await fetch('/api/state', { cache:'no-store', headers:{ 'x-admin-password': SENHA } });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
async function apiPost(st){
  const r = await fetch('/api/state', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-admin-password': SENHA },
    body: JSON.stringify(st),
  });
  if(r.status===401) throw new Error('401');
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||('HTTP '+r.status)); }
  return r.json();
}
async function apiAcessos(body){
  const r = await fetch('/api/acessos', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-admin-password': SENHA },
    body: JSON.stringify(body),
  });
  if(r.status===401) throw new Error('401');
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||('HTTP '+r.status)); }
  return r.json();
}

function setStatus(html){ $('#status').innerHTML = html; }

// Garante um id estável em cada participante (necessário para ligar credenciais).
function ensureIds(){
  let mudou = false;
  state.participants.forEach(p => { if(!p.id){ p.id = uuid(); mudou = true; } });
  return mudou;
}

// Registra uma edição de palpite do admin (para o merge).
function recordPalp(id, n, val){ palpEdits[id+'|'+n] = val; }

// Agenda o save (debounce). authoritative=true => grava o `state` como está
// (usado em reset/import); senão faz merge para preservar edições paralelas.
function agendarSave(authoritative){
  if(authoritative) saveAuthoritative = true;
  setStatus('<span class="saving">salvando…</span>');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(salvarAgora, 700);
}

async function salvarAgora(){
  const auth = saveAuthoritative; saveAuthoritative = false;
  const edits = palpEdits; palpEdits = {};
  try{
    if(!auth){
      // Merge: parte do estado mais recente do servidor para não desfazer os
      // palpites que os participantes salvaram enquanto o admin estava editando.
      const fresh = await apiGet();
      const freshById = {};
      fresh.participants.forEach(p => { if(p.id) freshById[p.id] = p; });
      state.participants.forEach(p => {
        const base = (p.id && freshById[p.id]) ? {...freshById[p.id].palpites} : {...p.palpites};
        Object.keys(edits).forEach(key => {
          const [id, n] = key.split('|');
          if(id !== p.id) return;
          const v = edits[key];
          if(v == null) delete base[n]; else base[n] = v;
        });
        p.palpites = base;
      });
    }
    await apiPost(state);
    const h = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setStatus(`<span class="ok">✓ salvo às ${h}</span>`);
  }catch(e){
    if(e.message==='401'){ deslogar('Senha incorreta. Entre novamente.'); return; }
    // devolve as edições e tenta de novo
    Object.assign(palpEdits, edits); if(auth) saveAuthoritative = true;
    setStatus(`<span class="err">erro ao salvar: ${esc(e.message)} — tentando de novo…</span>`);
    setTimeout(salvarAgora, 4000);
  }
}

function deslogar(msg){
  SENHA=''; sessionStorage.removeItem('bolao_admin_pw');
  $('#app').style.display='none'; $('#login').style.display='flex';
  $('#loginErro').textContent = msg||'';
  $('#senha').value='';
}

async function entrar(){
  const pw = $('#senha').value;
  if(!pw){ $('#loginErro').textContent='Digite a senha.'; return; }
  SENHA = pw;
  $('#loginErro').textContent='Carregando…';
  try{
    // valida a senha sem gravar nada (acessos exige admin e só lê).
    const res = await apiAcessos({ action:'list' });
    acessos = res.users || [];
    state = await apiGet();
    if(ensureIds()) await apiPost(state);     // persiste os ids recém-criados
    sessionStorage.setItem('bolao_admin_pw', pw);
    $('#login').style.display='none'; $('#app').style.display='block';
    setStatus('<span class="ok">✓ conectado</span>');
    renderResultados(); renderPalpites();
  }catch(e){
    SENHA='';
    $('#loginErro').textContent = (e.message==='401') ? 'Senha incorreta.' : ('Erro: '+e.message);
  }
}

/* ===================== PONTUAÇÃO ===================== */
function points(RC, RF, PC, PF){
  if (RC==null || RF==null || PC==null || PF==null) return null;
  if (PC===RC && PF===RF) return 25;
  if (RC===RF) return (PC===PF) ? 5 : 0;
  const venceuCerto = (RC>RF && PC>PF) || (RC<RF && PC<PF);
  if (!venceuCerto) return 0;
  let p = 10;
  if (Math.max(RC,RF) === Math.max(PC,PF)) p = Math.max(p,18);
  if (Math.min(RC,RF) === Math.min(PC,PF)) p = Math.max(p,15);
  if ((RC-RF) === (PC-PF))                 p = Math.max(p,12);
  return p;
}
const corPts = v => v===25?'var(--p25)':v===18?'var(--p18)':v===15?'var(--p15)':v===12?'var(--p12)':v===10?'var(--p10)':v===5?'var(--p5)':'var(--p0)';
// Multiplicador de pontos por fase do mata-mata (16-avos 1,5× → final 5×).
function multFase(fase){
  switch (fase){
    case '16-avos':   return 1.5;
    case 'Oitavas':   return 2;
    case 'Quartas':   return 3;
    case 'Semifinal': return 4;
    case 'Disputa 3º':return 4;
    case 'Final':     return 5;
    default:          return 1;
  }
}
// Bônus FIXO de +15 pelo acerto do vencedor nos pênaltis (não multiplica pela fase).
// Só vale quando o resultado real E o palpite foram empate (foi pra pênaltis).
function bonusPen(RC, RF, PC, PF, realPen, palpPen){
  if (RC==null || RF==null || PC==null || PF==null) return 0;
  if (RC!==RF || PC!==PF) return 0;
  if (!realPen || !palpPen) return 0;
  return palpPen===realPen ? 15 : 0;
}
const fmtPts = v => (Math.round(v*10)/10).toString().replace('.', ',');
// Mata-mata: jogos cuja fase tem multiplicador (>1). Grupos = 1.
const mataMata = f => multFase(f.fase) > 1;
function contaResultados(){ return state.fixtures.filter(f => f.placar.casa != null && f.placar.fora != null).length; }
function totalPalpites(){ return state.participants.reduce((a,p)=>a+Object.keys(p.palpites).length,0); }
function fases(){ const s=[]; state.fixtures.forEach(f=>{ if(!s.includes(f.fase)) s.push(f.fase); }); return s; }

/* ===================== RESOLUÇÃO DO CHAVEAMENTO (só exibição) =============
 * Espelha lib/store.js resolverChaveamento(): troca os placeholders do
 * mata-mata ("1º Grupo A", "Vencedor J74", "3º (...)") pelos times reais já
 * decididos. NÃO mexe em `state` (que é salvo com os placeholders) — RES é uma
 * cópia usada apenas para mostrar os nomes. Mantenha em sincronia com o servidor.
 */
const TERCEIRO_POR_JOGO = { 74:'D', 77:'F', 79:'E', 80:'K', 81:'B', 82:'I', 85:'J', 87:'L' };
function classificacaoGrupo(st, grupoNome){
  const grupo = (st.groups||[]).find(g => g.nome === grupoNome);
  if (!grupo) return null;
  const tab = {};
  grupo.times.forEach(t => { tab[t.nome] = { time:t, J:0,V:0,E:0,D:0,gp:0,gc:0 }; });
  for (const f of st.fixtures){
    if (f.grupo !== grupoNome || !f.placar || f.placar.casa == null) continue;
    const c = tab[f.casa.nome], v = tab[f.fora.nome];
    if (!c || !v) continue;
    const gc = f.placar.casa, gf = f.placar.fora;
    c.J++; v.J++; c.gp+=gc; c.gc+=gf; v.gp+=gf; v.gc+=gc;
    if (gc>gf){ c.V++; v.D++; } else if (gc<gf){ v.V++; c.D++; } else { c.E++; v.E++; }
  }
  const arr = Object.values(tab).map(r => ({ ...r, P:r.V*3+r.E, S:r.gp-r.gc }))
    .sort((a,b) => b.P-a.P || b.S-a.S || b.gp-a.gp || a.time.nome.localeCompare(b.time.nome));
  return { arr, completo: arr.every(r => r.J === 3) };
}
function vencedorDe(fx){ if(!fx||!fx.placar||fx.placar.casa==null||fx.placar.casa===fx.placar.fora) return null; return fx.placar.casa>fx.placar.fora?fx.casa:fx.fora; }
function perdedorDe(fx){ if(!fx||!fx.placar||fx.placar.casa==null||fx.placar.casa===fx.placar.fora) return null; return fx.placar.casa>fx.placar.fora?fx.fora:fx.casa; }
function resolverChaveamento(st){
  const cls = {}, getCls = nome => (cls[nome] || (cls[nome] = classificacaoGrupo(st, nome)));
  const byN = {}; st.fixtures.forEach(f => byN[f.n]=f);
  const aplica = (slot,t) => { if(t){ slot.nome=t.nome; slot.flag=t.flag; } };
  function res(f, side){
    const slot = f[side]; if(!slot || typeof slot.nome!=='string') return; let m;
    if((m=/^([12])º Grupo (.+)$/.exec(slot.nome))){ const c=getCls('Grupo '+m[2]); if(c&&c.completo) aplica(slot, c.arr[+m[1]-1].time); }
    else if(/^3º/.test(slot.nome)){ const l=TERCEIRO_POR_JOGO[f.n]; if(!l) return; const c=getCls('Grupo '+l); if(c&&c.completo) aplica(slot, c.arr[2].time); }
    else if((m=/^Vencedor J(\d+)$/.exec(slot.nome))){ aplica(slot, vencedorDe(byN[+m[1]])); }
    else if((m=/^Perdedor J(\d+)$/.exec(slot.nome))){ aplica(slot, perdedorDe(byN[+m[1]])); }
  }
  st.fixtures.filter(f=>f.n>=73).sort((a,b)=>a.n-b.n).forEach(f => { res(f,'casa'); res(f,'fora'); });
  return st;
}
// Vista resolvida de `state` (cópia), indexada por nº de jogo — só para exibir.
function fixturesResolvidos(){
  const copy = JSON.parse(JSON.stringify(state));
  resolverChaveamento(copy);
  const m = {}; copy.fixtures.forEach(f => m[f.n] = f); return m;
}

function ehEmpateMata(f){ return mataMata(f) && f.placar.casa!=null && f.placar.casa===f.placar.fora; }
function setResultado(n, side, val){
  const f = state.fixtures.find(x => x.n===n);
  const antes = ehEmpateMata(f);
  f.placar[side] = (val===''||val==null) ? null : Math.max(0, parseInt(val,10)||0);
  // Pênalti só existe em empate de mata-mata; se deixou de ser empate, remove.
  if (!ehEmpateMata(f)) delete f.placar.pen;
  agendarSave();
  if (antes !== ehEmpateMata(f)) renderResultados(); // mostra/esconde a linha de pênaltis
}
function setResultadoPen(n, side){
  const f = state.fixtures.find(x => x.n===n);
  if (!ehEmpateMata(f)) return;
  f.placar.pen = (f.placar.pen===side) ? undefined : side; // clica de novo => desmarca
  if (f.placar.pen===undefined) delete f.placar.pen;
  agendarSave();
  renderResultados();
}

function setPalpite(n, side, val){
  const part = state.participants[palSel], key = String(n);

  const p = part.palpites[key] || {};
  if (val===''||val==null) delete p[side]; else p[side] = Math.max(0, parseInt(val,10)||0);
  if (p.casa==null && p.fora==null) delete part.palpites[key];
  else {
    part.palpites[key] = { casa: p.casa!=null?p.casa:0, fora: p.fora!=null?p.fora:0 };

    if (f && mataMata(f) && part.palpites[key].casa===part.palpites[key].fora && p.pen) part.palpites[key].pen = p.pen;
  }
  recordPalp(part.id, key, part.palpites[key] || null);

function aplicarBulk(texto){
  const part = state.participants[palSel];
  let aplicados = 0;
  texto.split(/\n+/).forEach(linha => {
    const m = linha.match(/(?:jogo\s*)?(\d{1,3})\D+(\d{1,2})\s*[x:\-]\s*(\d{1,2})/i);
    if (!m) return;
    const n = parseInt(m[1],10);
    if (n<1 || n>state.fixtures.length) return;
    part.palpites[String(n)] = { casa: parseInt(m[2],10), fora: parseInt(m[3],10) };
    recordPalp(part.id, String(n), part.palpites[String(n)]);
    aplicados++;
  });
  agendarSave();
  return aplicados;
}

/* ===================== ABA COLAR DO GRUPO ===================== */
// Cola a mensagem do grupo (palpites por NOME de um jogo) e aplica todos de uma vez.
let colarParsed = null, colarJogo = null;

const norm = s => String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');

function matchParticipant(raw){
  const n = norm(raw);
  if(!n) return { idx:-1 };
  let i = state.participants.findIndex(x => norm(x.nome)===n);
  if(i>=0) return { idx:i, how:'exato' };
  i = state.participants.findIndex(x => { const xn=norm(x.nome); return xn.startsWith(n) || n.startsWith(xn); });
  if(i>=0) return { idx:i, how:'prefixo' };
  i = state.participants.findIndex(x => n.length>=3 && norm(x.nome).slice(0,4)===n.slice(0,4));
  if(i>=0) return { idx:i, how:'aprox' };
  return { idx:-1 };
}

function parseGroupMessage(text){
  const tnorm = norm(text);
  const RES = fixturesResolvidos();
  // Jogo candidato: os dois times (normalizados) aparecem na mensagem.
  const candidates = state.fixtures.filter(f => {
    const rf = RES[f.n], a = norm(rf.casa.nome), b = norm(rf.fora.nome);
    return a && b && tnorm.includes(a) && tnorm.includes(b);
  }).map(f => f.n);
  // Linhas de palpite: <nome> <golsCasa> <x|:|-> <golsFora> [resto ignorado]
  const lines = [];
  text.split(/\n+/).forEach(linha => {
    const m = linha.match(/^\s*([A-Za-zÀ-ÿ0-9.\-'’ ]+?)\s+(\d{1,2})\s*[x×:\-]\s*(\d{1,2})\b/i);
    if(!m) return;
    const raw = m[1].trim();
    const mt = matchParticipant(raw);
    lines.push({ raw, casa: parseInt(m[2],10), fora: parseInt(m[3],10), matchIdx: mt.idx, how: mt.how });
  });
  return { candidates, lines };
}

function baixar(nome, conteudo, tipo){
  const blob = new Blob([conteudo],{type:tipo}), url = URL.createObjectURL(blob);

// Liga cada participante a um login+senha (guardados em bolao:auth, fora do GET público).
function credDe(id){ return acessos.find(a => a.id === id) || null; }
function sugereLogin(nome){
  let base = norm(String(nome).split(/\s+/)[0]) || 'user';
  let login = base, i = 2;
  while (acessos.some(a => a.login === login)) login = base + i++;
  return login;
}
function geraSenha(){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789'; // sem caracteres ambíguos
  let s = ''; for (let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

    `Dica: cada jogo trava no horário do apito inicial.`;
}
async function copiar(txt, btn){
  try{ await navigator.clipboard.writeText(txt); }
  catch{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  if(btn){ const o=btn.textContent; btn.textContent='✓ copiado'; setTimeout(()=>btn.textContent=o,1500); }
}

let relFase = 'Todas';
function textoRelatorio(){
  let out = `🏆 BOLÃO DA COPA 2026 — PALPITES\n`;
  const RES = fixturesResolvidos();
  const lista = state.fixtures.filter(f => relFase==='Todas' || f.fase===relFase);
  lista.forEach(f => {
    const rf = RES[f.n];
    const linhas = [];
    state.participants.forEach(p => {
      const pal = p.palpites[String(f.n)];
      if(!pal) return;
      const r = f.placar, jogou = r.casa!=null;
      const pt = jogou ? ` (${fmtPts(points(r.casa,r.fora,pal.casa,pal.fora) * multFase(f.fase) + bonusPen(r.casa,r.fora,pal.casa,pal.fora,r.pen,pal.pen))} pts)` : '';
      const penTxt = (pal.casa===pal.fora && pal.pen) ? ` [pên: ${(pal.pen==='casa'?rf.casa:rf.fora).nome}]` : '';
      linhas.push(`• ${p.nome}: ${pal.casa}×${pal.fora}${penTxt}${pt}`);
    });
    if(!linhas.length) return;

    out += `\n#${f.n} ${rf.casa.nome} × ${rf.fora.nome} (${f.data} ${f.hora})${real}\n` + linhas.join('\n') + '\n';
  });

  if (t.id==='btnAplicar'){ const q=aplicarBulk($('#bulk').value); renderPalpites(); alert(q+' palpite(s) aplicado(s).'); return; }
  if (t.id==='btnLer'){

  if (t.id==='btnReset'){
    if(!confirm('Resetar tudo para os dados originais? Isso apaga resultados e palpites de todos.')) return;
    try{ const seed = await (await fetch('/bolao.seed.json',{cache:'no-store'})).json();
      state = seed; ensureIds(); palpEdits={}; agendarSave(true); renderResultados(); renderPalpites(); renderFerramentas(); }
    catch(err){ alert('Não foi possível carregar os dados originais: '+err.message); }
    return;
  }
  if (t.id==='btnSair' || t.closest('#btnLogout')){ deslogar(''); return; }

  /* ----- Aba Relatório ----- */
  const rf = t.closest('.filtros button');
  if (rf && t.closest('#relatorio')){ relFase=rf.dataset.relf; renderRelatorio(); return; }
  if (t.id==='btnCopiarRel'){ copiar($('#relTexto').value, t); return; }

  /* ----- Aba Acessos ----- */
  if (t.id==='btnCopiarTodos'){
    const txt = acessos.map(a => msgAcesso(a.login, a.senha, a.nome)).join('\n\n— — —\n\n')
      || 'Nenhum acesso criado ainda.';
    copiar(txt, t); return;
  }
  const card = t.closest('[data-acc]');
  if (card){
    const id = card.getAttribute('data-acc');
    const part = state.participants.find(p => p.id === id);
    const loginEl = card.querySelector('[data-acc-login]');
    const senhaEl = card.querySelector('[data-acc-senha]');
    if (t.hasAttribute('data-acc-gerar')){ senhaEl.value = geraSenha(); return; }
    if (t.hasAttribute('data-acc-salvar')){
      const login = loginEl.value.trim().toLowerCase(), senha = senhaEl.value.trim();
      if(!login||!senha){ alert('Preencha login e senha.'); return; }
      t.disabled = true; t.textContent = 'Salvando…';
      try{
        await apiAcessos({ action:'set', login, senha, id, nome: part ? part.nome : '' });
        acessos = (await apiAcessos({ action:'list' })).users || [];
        renderAcessos();
      }catch(err){ if(err.message==='401') return deslogar('Senha incorreta.'); alert('Erro: '+err.message); t.disabled=false; t.textContent='Salvar acesso'; }
      return;
    }
    if (t.hasAttribute('data-acc-copiar')){
      const c = credDe(id); if(c) copiar(msgAcesso(c.login, c.senha, c.nome || (part&&part.nome) || ''), t); return;
    }
    if (t.hasAttribute('data-acc-remover')){
      const c = credDe(id); if(!c) return;
      if(!confirm('Remover o acesso de '+(part?part.nome:c.login)+'? Ele não vai mais conseguir entrar.')) return;
      try{ await apiAcessos({ action:'remove', login:c.login }); acessos = (await apiAcessos({ action:'list' })).users || []; renderAcessos(); }
      catch(err){ if(err.message==='401') return deslogar('Senha incorreta.'); alert('Erro: '+err.message); }
      return;
    }
  }
});

document.addEventListener('change', e => {
  if (e.target.id==='selPart'){ palSel=+e.target.value; renderPalpites(); }
  if (e.target.id==='selJogo'){ colarJogo=+e.target.value; }
  if (e.target.id==='fileImport'){
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ const o=JSON.parse(rd.result); if(!o.fixtures||!o.participants) throw 0; state=o; ensureIds(); palpEdits={}; agendarSave(true); renderResultados(); renderPalpites(); renderFerramentas(); }catch(err){ alert('Arquivo inválido.'); } };
    rd.readAsText(f);
  }
});

/* ===================== INIT ===================== */
$('#loginIcon').innerHTML = ic('lock',30);
$('#keyIcon').innerHTML = ic('key-round',18);
$('#entrarIcon').innerHTML = ic('arrow-right',18);
$('#hIcon').innerHTML = ic('shield-check',18);
$('#logoutIcon').innerHTML = ic('log-out',15);

if (SENHA){ $('#senha').value = SENHA; entrar(); }  // auto-login se já houver senha na sessão
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meus palpites — Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13; --panel:#0E1219; --surface:#151A22; --elev1:#1B212B; --elev2:#141922; --input:#0E1219;
    --bd:#232A34; --bd2:#2A323E; --div:#1A202A; --div2:#1F2630; --bdin:#2E3742;
    --t1:#EEF1F5; --t2:#9AA3B0; --t3:#828B98; --t4:#6B7482; --t5:#5E6775;
    --accent:#E3B765; --ok:#38D69A; --warn:#E58A6B;
    --p25:#38D69A; --p18:#5AA9E6; --p15:#9B8CFF; --p12:#C58AE5; --p10:#E3B765; --p5:#6B7482; --p0:#44505E;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -10%,#16202C,#070A0E 60%);min-height:100vh;color:var(--t1);
    font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-text-size-adjust:100%}
  svg{display:block}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
  @media(min-width:481px){.app{box-shadow:0 0 0 1px #1C222C,0 30px 80px rgba(0,0,0,.5)}}
  .app-h{padding:14px 22px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex:none}
  .eyebrow{font:500 11px 'Space Grotesk';letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .h-title{font:700 24px 'Space Grotesk';letter-spacing:-.02em;color:var(--t1);margin-top:3px}
  .chip-btn{display:flex;align-items:center;gap:6px;color:var(--t3);font:600 12px 'Hanken Grotesk';cursor:pointer;
    background:var(--surface);border:none;border-radius:999px;padding:7px 12px}
  .scroll{flex:1;overflow-y:auto;padding:6px 22px 40px}
  .muted{color:var(--t3)}
  #ola{font:500 13px 'Hanken Grotesk';color:var(--t3);margin:0 22px}
  #status{font:600 12px 'Hanken Grotesk';margin:4px 22px 0;min-height:1.1em}
  #status .ok{color:var(--ok)} #status .err{color:var(--warn)} #status .saving{color:var(--accent)}
  .notice{display:flex;align-items:center;gap:8px;background:var(--elev1);border:1px solid var(--bd2);border-radius:12px;
    padding:10px 12px;margin:10px 0 14px;font:600 12px 'Hanken Grotesk';color:#C9CFD8}
  .notice .ico{color:var(--accent);display:flex;flex:none}
  /* stats + chips */
  .stats{display:flex;gap:10px;margin-bottom:12px}
  .stats .b{flex:1;background:var(--surface);border:1px solid var(--bd);border-radius:14px;padding:12px;text-align:center}
  .stats .b b{display:block;font:700 22px 'Space Grotesk';color:var(--accent)}
  .stats .b span{font:500 11px 'Hanken Grotesk';color:var(--t3)}
  .chips{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;font:600 12px 'Hanken Grotesk';color:var(--t2);background:var(--surface);
    border:1px solid var(--bd);padding:7px 14px;border-radius:999px;cursor:pointer}
  .chip.active{background:var(--accent);color:#0B0E13;border-color:var(--accent)}
  /* palpite card */
  .pcard{background:var(--surface);border:1px solid var(--bd);border-radius:18px;padding:14px;margin-bottom:12px}
  .pcard.locked{opacity:.82}
  .pcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .pcard-top .gp{font:600 11px 'Hanken Grotesk';color:var(--accent)}
  .pcard-top .when{font:500 11px 'Hanken Grotesk';color:var(--t4)}
  .pcard-row{display:flex;align-items:center;justify-content:center;gap:10px}
  .pcard-row .nm{flex:1;font:700 14px 'Hanken Grotesk';color:var(--t1);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard-row .nm.h{text-align:right}
  .pcard-row .nm.a{text-align:left}
  .sbox{width:48px;height:48px;border:1.5px solid var(--bdin);border-radius:12px;text-align:center;
    font:700 19px 'Space Grotesk';color:var(--t1);background:var(--input);outline:none;flex:none;-moz-appearance:textfield}
  .sbox::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .sbox:focus{border-color:var(--accent)}
  .sbox:disabled{opacity:.45}
  .pcard-row .x{color:var(--t5);font:600 14px 'Hanken Grotesk';flex:none}
  .penrow{margin-top:10px;padding-top:10px;border-top:1px solid var(--div2)}
  .penlbl{display:block;font:600 11px 'Hanken Grotesk';color:var(--t3);margin-bottom:7px}
  .penbtns{display:flex;gap:8px}
  .penbtn{flex:1;cursor:pointer;border:1.5px solid var(--bdin);border-radius:10px;padding:9px 8px;min-width:0;
    font:600 12px 'Hanken Grotesk';background:var(--input);color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .penbtn.on{background:var(--accent);color:#0B0E13;border-color:var(--accent)}
  .penbtn:disabled{cursor:default;opacity:.6}
  .pcard-foot{margin-top:10px;padding-top:10px;border-top:1px solid var(--div2);display:flex;justify-content:flex-end;
    align-items:center;gap:8px;font:600 12px 'Hanken Grotesk';color:var(--t4)}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font:700 12px 'Space Grotesk';color:#0B0E13}
  .foot-links{text-align:center;padding:8px 0 20px}
  .link{color:var(--accent);text-decoration:none;font:600 13px 'Hanken Grotesk'}
  /* login */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;
    background:radial-gradient(1200px 700px at 50% -10%,#16202C,#070A0E 60%)}
  .loginbox{width:100%;max-width:360px;text-align:center}
  .login-ic{width:64px;height:64px;border-radius:18px;background:var(--accent);display:flex;align-items:center;
    justify-content:center;color:#0B0E13;margin:0 auto}
  .login-h{font:700 25px 'Space Grotesk';letter-spacing:-.02em;margin-top:22px}
  .login-p{font:500 14px 'Hanken Grotesk';color:var(--t3);margin-top:8px;line-height:1.5}
  .field{margin-top:12px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--bd2);
    border-radius:12px;padding:4px 4px 4px 16px}
  .field .ico{color:var(--t3);display:flex;flex:none}
  .field input{flex:1;border:none;background:transparent;color:var(--t1);font:600 16px 'Hanken Grotesk';outline:none;padding:12px 0}
  .btn-primary{width:100%;margin-top:14px;background:var(--accent);border:none;border-radius:12px;padding:15px;
    font:700 15px 'Hanken Grotesk';color:#0B0E13;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
  .erro{color:var(--warn);font:500 13px 'Hanken Grotesk';margin-top:12px;min-height:1em}
  #app{display:none}
</style>
</head>
<body>

<div id="login">
  <div class="loginbox">
    <div class="login-ic" id="loginIcon"></div>
    <div class="login-h">Meus palpites</div>
    <div class="login-p">Entre com o login e a senha que o organizador te enviou.</div>
    <div class="field"><span class="ico" id="userIcon"></span><input id="login_user" placeholder="login" autocomplete="username"></div>
    <div class="field"><span class="ico" id="pwIcon"></span><input type="password" id="login_pw" placeholder="senha" autocomplete="current-password"></div>
    <button class="btn-primary" id="btnEntrar">Entrar <span id="entrarIcon"></span></button>
    <div class="erro" id="loginErro"></div>
    <p style="margin-top:16px"><a class="link" href="/">← Ver o ranking e os jogos</a></p>
  </div>
</div>

<div id="app">
  <div class="app">
    <header class="app-h">
      <div>
        <div class="eyebrow">Copa 2026 · Bolão</div>
        <div class="h-title">Meus palpites</div>
      </div>
      <button class="chip-btn" id="btnSair"><span id="sairIcon"></span>Sair</button>
    </header>
    <div id="ola"></div>
    <div id="status"></div>
    <main class="scroll">
      <div class="notice"><span class="ico" id="clockIcon"></span><span>Cada jogo trava no apito inicial (Brasília). Salva sozinho enquanto você digita.</span></div>
      <div class="stats" id="totais"></div>
      <div class="chips" id="filtros"></div>
      <div id="lista"></div>
      <div class="foot-links"><a class="link" href="/">Ver ranking e jogos →</a></div>
    </main>
  </div>
</div>

<script>
/* ===================== ÍCONES (Lucide, inline) ===================== */
const ICONS = {"lock":"<rect width=\"18\" height=\"11\" x=\"3\" y=\"11\" rx=\"2\" ry=\"2\" /><path d=\"M7 11V7a5 5 0 0 1 10 0v4\" />","key-round":"<path d=\"M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z\" /><circle cx=\"16.5\" cy=\"7.5\" r=\".5\" fill=\"currentColor\" />","arrow-right":"<path d=\"M5 12h14\" /><path d=\"m12 5 7 7-7 7\" />","log-out":"<path d=\"m16 17 5-5-5-5\" /><path d=\"M21 12H9\" /><path d=\"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\" />","clock":"<circle cx=\"12\" cy=\"12\" r=\"10\" /><path d=\"M12 6v6l4 2\" />"};
function ic(name, size){ size=size||20; return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }

let LOGIN = localStorage.getItem('bolao_meu_login') || '';
let SENHA = localStorage.getItem('bolao_meu_pw') || '';
let NOME = '', FIX = [], PALP = {}, dirty = {}, saveTimer = null;
let faseFiltro = 'Todas';

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const corPts = v => v===25?'var(--p25)':v===18?'var(--p18)':v===15?'var(--p15)':v===12?'var(--p12)':v===10?'var(--p10)':v===5?'var(--p5)':'var(--p0)';

function points(RC,RF,PC,PF){
  if (RC==null||RF==null||PC==null||PF==null) return null;
  if (PC===RC&&PF===RF) return 25;
  if (RC===RF) return (PC===PF)?5:0;
  const ok=(RC>RF&&PC>PF)||(RC<RF&&PC<PF); if(!ok) return 0;
  let p=10;
  if(Math.max(RC,RF)===Math.max(PC,PF)) p=Math.max(p,18);
  if(Math.min(RC,RF)===Math.min(PC,PF)) p=Math.max(p,15);
  if((RC-RF)===(PC-PF)) p=Math.max(p,12);
  return p;
}
// Multiplicador de pontos por fase do mata-mata (16-avos 1,5× → final 5×).
function multFase(fase){
  switch (fase){
    case '16-avos':   return 1.5;
    case 'Oitavas':   return 2;
    case 'Quartas':   return 3;
    case 'Semifinal': return 4;
    case 'Disputa 3º':return 4;
    case 'Final':     return 5;
    default:          return 1;
  }
}
// Bônus FIXO de +15 pelo acerto do vencedor nos pênaltis (não multiplica pela fase).
// Só vale quando o resultado real E o palpite foram empate (foi pra pênaltis).
function bonusPen(RC, RF, PC, PF, realPen, palpPen){
  if (RC==null || RF==null || PC==null || PF==null) return 0;
  if (RC!==RF || PC!==PF) return 0;
  if (!realPen || !palpPen) return 0;
  return palpPen===realPen ? 15 : 0;
}
const fmtPts = v => (Math.round(v*10)/10).toString().replace('.', ',');
// Mata-mata: jogos cuja fase tem multiplicador (>1). Grupos = 1.
const mataMata = f => multFase(f.fase) > 1;
const comecou = f => f.kickoff ? Date.now() >= Date.parse(f.kickoff) : (f.placar && f.placar.casa!=null);

function setStatus(html){ $('#status').innerHTML = html; }

async function carregarFixtures(){
  const r = await fetch('/api/state',{cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  FIX = d.fixtures;
}
async function loginReq(palpites){
  const body = { login: LOGIN, senha: SENHA };
  if (palpites) body.palpites = palpites;
  const r = await fetch('/api/palpite',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if(r.status===401) throw new Error('401');
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||('HTTP '+r.status)); }
  return r.json();
}

function deslogar(msg){
  LOGIN=''; SENHA=''; localStorage.removeItem('bolao_meu_login'); localStorage.removeItem('bolao_meu_pw');
  $('#app').style.display='none'; $('#login').style.display='flex';
  $('#loginErro').textContent = msg||''; $('#login_pw').value='';
}

async function entrar(){
  LOGIN = $('#login_user').value.trim().toLowerCase();
  SENHA = $('#login_pw').value;

  if(!LOGIN||!SENHA){ $('#loginErro').textContent='Preencha login e senha.'; return; }
  $('#loginErro').textContent='Entrando…';
  try{
    await carregarFixtures();
    const me = await loginReq(null);
    NOME = me.nome; PALP = me.palpites || {};
    localStorage.setItem('bolao_meu_login', LOGIN); localStorage.setItem('bolao_meu_pw', SENHA);
    $('#login').style.display='none'; $('#app').style.display='block';
    $('#ola').textContent = `Olá, ${NOME}!`;
    setStatus('<span class="ok">✓ conectado</span>');
    render();
  }catch(e){
    $('#loginErro').textContent = (e.message==='401') ? 'Login ou senha incorretos.' : ('Erro: '+e.message);
  }
}

function agendarSave(){
  setStatus('<span class="saving">salvando…</span>');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const envio = dirty; dirty = {};
    if(!Object.keys(envio).length){ return; }
    try{
      const res = await loginReq(envio);
      PALP = res.palpites || PALP;
      let extra = '';
      if(res.travados && res.travados.length) extra = ` <span class="err">(jogo(s) ${res.travados.join(', ')} já começaram — não salvos)</span>`;
      const h = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setStatus(`<span class="ok">✓ salvo às ${h}</span>${extra}`);
      if(extra) renderLista(); // reflete o que travou
    }catch(e){
      if(e.message==='401'){ deslogar('Sessão expirada. Entre de novo.'); return; }
      Object.assign(dirty, envio); // devolve para tentar de novo
      setStatus(`<span class="err">erro ao salvar: ${esc(e.message)} — tentando…</span>`);
      setTimeout(agendarSave, 4000);
    }
  }, 700);
}

function fases(){ const s=[]; FIX.forEach(f=>{ if(!s.includes(f.fase)) s.push(f.fase); }); return s; }

function render(){ renderTotais(); renderFiltros(); renderLista(); }

function renderTotais(){
  let pts=0, exatos=0, enviados=Object.keys(PALP).length;
  FIX.forEach(f=>{ const p=PALP[String(f.n)], r=f.placar; if(p&&r&&r.casa!=null){ const base=points(r.casa,r.fora,p.casa,p.fora); if(base!=null){ pts+=base*multFase(f.fase)+bonusPen(r.casa,r.fora,p.casa,p.fora,r.pen,p.pen); if(base===25) exatos++; } } });
  $('#totais').innerHTML = `
    <div class="b"><b>${fmtPts(pts)}</b><span>pontos</span></div>
    <div class="b"><b>${exatos}</b><span>exatos</span></div>
    <div class="b"><b>${enviados}</b><span>palpites</span></div>`;
}

function renderFiltros(){
  let h = `<span class="chip ${faseFiltro==='Todas'?'active':''}" data-f="Todas">Todas</span>`;
  fases().forEach(f => h += `<span class="chip ${faseFiltro===f?'active':''}" data-f="${esc(f)}">${esc(f)}</span>`);
  $('#filtros').innerHTML = h;
}

function renderLista(){
  let h = '';
  FIX.filter(f => faseFiltro==='Todas'||f.fase===faseFiltro).forEach(f => {
    const p = PALP[String(f.n)], r = f.placar, trava = comecou(f);
    const jogou = r && r.casa!=null;
    const gp = f.grupo ? f.grupo : f.fase;
    const when = trava ? (jogou ? 'Encerrado' : 'Começou') : `${esc(f.data)} · ${esc(f.hora)}`;
    let foot = '';
    if (trava){
      let pt = '';
      if (p && jogou){ const base=points(r.casa,r.fora,p.casa,p.fora); const v=base*multFase(f.fase)+bonusPen(r.casa,r.fora,p.casa,p.fora,r.pen,p.pen); pt=`<span class="pill" style="background:${corPts(base)};color:${base===0?'#EEF1F5':'#0B0E13'}">${fmtPts(v)}</span>`; }
      foot = `<div class="pcard-foot">${jogou?`Resultado ${r.casa}×${r.fora}`:'🔒 jogo travado'} ${pt}</div>`;
    }
    h += `<div class="pcard ${trava?'locked':''}">
      <div class="pcard-top"><span class="gp">${esc(gp)}</span><span class="when">${when}</span></div>
      <div class="pcard-row">
        <div class="nm h">${f.casa.flag} ${esc(f.casa.nome)}</div>
        <input class="sbox" type="number" min="0" inputmode="numeric" data-pal="${f.n}" data-side="casa" value="${p?p.casa:''}" ${trava?'disabled':''}>
        <span class="x">×</span>
        <input class="sbox" type="number" min="0" inputmode="numeric" data-pal="${f.n}" data-side="fora" value="${p?p.fora:''}" ${trava?'disabled':''}>
        <div class="nm a">${esc(f.fora.nome)} ${f.fora.flag}</div>
      </div>
      <div id="pen-${f.n}">${penRow(f, p)}</div>${foot}</div>`;
  });
  $('#lista').innerHTML = h;
}

// Linha "Quem ganha nos pênaltis?" — só em empate de mata-mata (ambos preenchidos).
function penRow(f, p){
  if (!(f && mataMata(f) && p && p.casa!=null && p.fora!=null && p.casa===p.fora)) return '';
  const trava = comecou(f), sel = p.pen;
  const btn = (side, time) => `<button class="penbtn ${sel===side?'on':''}" ${trava?'disabled':''} data-pen="${f.n}" data-side="${side}">${time.flag} ${esc(time.nome)}</button>`;
  return `<div class="penrow"><span class="penlbl">Quem ganha nos pênaltis?</span>
    <div class="penbtns">${btn('casa', f.casa)}${btn('fora', f.fora)}</div></div>`;
}
function atualizaPen(n){
  const el = document.getElementById('pen-'+n);
  if (el){ const f = FIX.find(x => x.n===n); el.innerHTML = penRow(f, PALP[String(n)]); }
}

function setPal(n, side, val){
  const key = String(n), f = FIX.find(x => x.n===n);
  const p = PALP[key] ? {...PALP[key]} : {};
  if (val===''||val==null) delete p[side]; else p[side] = Math.max(0, parseInt(val,10)||0);
  if (p.casa==null && p.fora==null){ delete PALP[key]; dirty[key] = { casa:null, fora:null }; }
  else {
    PALP[key] = { casa: p.casa!=null?p.casa:0, fora: p.fora!=null?p.fora:0 };
    // preserva o vencedor de pênaltis se ainda é empate de mata-mata; senão descarta
    if (f && mataMata(f) && PALP[key].casa===PALP[key].fora && p.pen) PALP[key].pen = p.pen;
    // só envia quando os dois lados estão preenchidos (evita salvar pela metade)
    if (p.casa!=null && p.fora!=null) dirty[key] = PALP[key];
  }
  agendarSave();
  atualizaPen(n); // mostra/esconde a linha de pênaltis sem re-renderizar a lista
}
function setPen(n, side){
  const key = String(n), f = FIX.find(x => x.n===n), p = PALP[key];
  if (!(f && mataMata(f) && p && p.casa!=null && p.fora!=null && p.casa===p.fora)) return;
  if (comecou(f)) return; // travado no apito
  if (p.pen===side) delete p.pen; else p.pen = side; // clica de novo => desmarca
  dirty[key] = p;
  agendarSave();
  atualizaPen(n);
}

/* ícones estáticos */
$('#loginIcon').innerHTML = ic('lock',30);
$('#userIcon').innerHTML = ic('key-round',18);
$('#pwIcon').innerHTML = ic('lock',18);
$('#entrarIcon').innerHTML = ic('arrow-right',18);
$('#sairIcon').innerHTML = ic('log-out',15);
$('#clockIcon').innerHTML = ic('clock',17);

/* eventos */
$('#btnEntrar').addEventListener('click', entrar);
$('#login_pw').addEventListener('keydown', e => { if(e.key==='Enter') entrar(); });
$('#btnSair').addEventListener('click', () => deslogar(''));
document.addEventListener('input', e => { const t=e.target; if(t.dataset.pal) setPal(+t.dataset.pal, t.dataset.side, t.value); });
document.addEventListener('click', e => {
  const pb=e.target.closest('[data-pen]'); if(pb){ setPen(+pb.dataset.pen, pb.dataset.side); return; }
  const b=e.target.closest('#filtros .chip'); if(b){ faseFiltro=b.dataset.f; renderFiltros(); renderLista(); }
});

/* init: auto-login se já tiver credencial salva */
if (LOGIN && SENHA){ $('#login_user').value=LOGIN; $('#login_pw').value=SENHA; entrar(); }
</script>
</body>
</html>
